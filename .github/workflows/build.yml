name: Build

on:
  push:
    tags:
      - "v*"          # nur bei Tags wie v1.0.0
  workflow_dispatch:  # oder manuell per Knopfdruck auf GitHub

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: DropShare.app
            zip_name: DropShare-macOS.zip
          - os: windows-latest
            artifact: dist/DropShare.exe
            zip_name: DropShare-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install PyQt6 aiohttp miniupnpc zeroconf pyinstaller

      - name: Bauen
        run: pyinstaller dropshare.spec --noconfirm --clean

      # macOS: Qt-Patch + signieren + zu ZIP packen
      - name: macOS Qt-Patch für macOS 26
        if: runner.os == 'macOS'
        run: python3 hook_macos_appkit.py || true
        # Eigentlicher Patch (hook_macos_appkit.py ist der runtime hook, Patch hier separat):
      - name: macOS QtCore.abi3.so patchen
        if: runner.os == 'macOS'
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys
          path = "dist/DropShare.app/Contents/Frameworks/PyQt6/QtCore.abi3.so"
          result = subprocess.run(["nm", path], capture_output=True, text=True)
          offset = None
          for line in result.stdout.split("\n"):
              if "__GLOBAL__sub_I_qdarwinpermissionplugin_location.mm" in line and " t " in line:
                  offset = int(line.split()[0], 16)
                  break
          if offset is None:
              print("Symbol nicht gefunden, übersprungen"); sys.exit(0)
          with open(path, "r+b") as f:
              f.seek(offset)
              f.write(bytes([0xC0, 0x03, 0x5F, 0xD6]))
          print(f"Patch angewendet bei 0x{offset:x}")
          PYEOF

      - name: macOS .app signieren
        if: runner.os == 'macOS'
        run: |
          find dist/DropShare.app -name "*.so" -o -name "*.dylib" | \
            xargs -I{} codesign --force --sign - {} 2>/dev/null || true
          codesign --force --deep --sign - dist/DropShare.app

      - name: macOS .app zippen
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../DropShare-macOS.zip DropShare.app

      # Windows: .exe zu ZIP packen
      - name: Windows .exe zippen
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\DropShare.exe -DestinationPath DropShare-Windows.zip
        shell: pwsh

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}
          retention-days: 30

  # Release erstellen wenn ein Tag gepusht wurde
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Artifacts herunterladen
        uses: actions/download-artifact@v4

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DropShare-macOS.zip/DropShare-macOS.zip
            DropShare-Windows.zip/DropShare-Windows.zip
